<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Admin Firebase PRO</title><link rel="stylesheet" href="../css/style.css"></head><body><header class="admin-hero"><h1>Panel Admin Firebase PRO</h1><p>Edita productos y guarda directamente en Firebase.</p><a href="../index.html" class="btn blue">Ver tienda</a></header><main class="admin-wrap"><section id="loginBox" class="panel"><h2>Ingresar</h2><input id="pass" type="password" placeholder="Contraseña privada"><button onclick="login()" class="btn red">Entrar</button><p id="msg" class="warn"></p></section><section id="adminPanel" class="panel hidden"><div class="toolbar"><button onclick="addProduct()" class="btn gold">➕ Agregar producto</button><button onclick="seedProducts()" class="btn blue">☁️ Subir productos iniciales</button><button onclick="reloadProducts()" class="btn dark">Actualizar</button></div><p class="note">Al guardar un producto, se actualiza en Firebase y tus clientes lo ven al instante.</p><p id="status" class="ok"></p><div id="editor"></div></section></main><script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script><script src="../js/config.js"></script><script src="../js/seed-products.js"></script><script src="../js/admin.js"></script></body></html>
